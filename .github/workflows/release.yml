name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/recipe-pipeline/package-lock.json
      - name: Install dependencies
        run: |
          cd apps/api && npm ci
          cd ../recipe-pipeline && npm ci
      - name: Run quality checks (api:test && recipes:test)
        run: npm run check

  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  testflight:
    needs: [release-please, quality]
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    uses: sunpebble/ci/.github/workflows/ios-testflight-fresh-pantry.yml@v2
    secrets: inherit