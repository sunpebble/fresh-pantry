name: release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Node.js 质量门禁:跑 api:test && recipes:test。每次 push main 和 PR 均执行,
  # 秒级反馈,确认 API/pipeline 无回归后才允许 testflight job 继续。
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # 非 workspace monorepo:根 package.json 只有便捷脚本,无依赖。各子包持有
      # 自己的 package-lock.json,故在各子包内分别 npm ci(根目录 npm ci 只装空根,
      # vitest 不会出现 → "vitest: not found" exit 127)。
      - name: Install dependencies
        run: |
          cd apps/api && npm ci
          cd ../recipe-pipeline && npm ci
      - name: Run quality checks (api:test && recipes:test)
        run: npm run check

  # 平时 push main 只跑这一段(便宜)。release-please 累积 Conventional Commits
  # 到一个 Release PR;合并 Release PR 那次 push 才 release_created==true,驱动
  # 下游 testflight。版本真源在 apps/ios/version.txt(release-please 维护)。
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 原生 SwiftUI app 构建 → 签名 → 上传 TestFlight。仅在产生 release 或手动触发时跑。
  # iOS 26 / Swift 6 需要 Xcode 26,故用 macos-26 runner(若 GitHub 尚未提供该镜像,
  # 改成带 Xcode 26 的可用 runner 即可)。私有仓 macOS 按 10x 计费,故只在发版时跑。
  testflight:
    needs: [release-please, quality]
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/ios
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: |
          # macOS runner ships aws/tap + azure/bicep untrusted; trust before install
          # so brew does not warn/fail once HOMEBREW_REQUIRE_TAP_TRUST is default.
          brew trust aws/tap azure/bicep
          brew install xcodegen

      - name: Install ASC API key
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "${{ secrets.ASC_API_KEY_P8 }}" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # 持久化签名身份:导入预先导出的 Apple Distribution 证书(含私钥)到一次性
      # keychain。ephemeral runner 每次都是干净 keychain,若靠 -allowProvisioningUpdates
      # 自动签名,Xcode 因本地无私钥会每次新建证书,几次后撞上账户证书配额上限
      #("Your account has reached the maximum number of certificates" → 连带
      # "No profiles ... were found")。导入固定证书后,自动签名复用它而不再新建,
      # profile 仍由 ASC API key 按需获取。证书一次性导出见步骤说明(README/此步注释)。
      - name: Import Apple Distribution certificate (persistent signing identity)
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"

          echo -n "$DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # 不设 lock timeout:keychain 跨后续 step(archive / export)保持解锁
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书+私钥;-A 允许任意工具读取,set-key-partition-list 避免 codesign 弹授权框
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 关键:设为「默认 keychain」。ephemeral runner 上 xcodebuild 自动签名靠 default keychain
          # 定位签名身份,仅把临时 keychain 加进 search list 不够——没设 default 时自动签名找不到
          # Distribution 证书,会退化为 Development → 撞证书配额(1.4.0/1.5.0 实测)。search list 再
          # 保留 login.keychain,供 codesign 取 Apple WWDR 中间证书构建证书链。
          security default-keychain -s "$KEYCHAIN_PATH"
          if [ -f "$LOGIN_KEYCHAIN" ]; then
            security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN"
          else
            security list-keychains -d user -s "$KEYCHAIN_PATH"
          fi

          # 诊断:确认 Distribution 证书已可见(若再失败据此定位)
          security find-identity -v -p codesigning

      # 安装预生成的 App Store provisioning profiles(经 ASC API 创建,关联上面导入的
      # Distribution 证书)。Xcode 按 profile 内 UUID 索引,文件名随意;Release 配置 manual
      # 签名据 PROVISIONING_PROFILE_SPECIFIER(profile 名)定位。
      - name: Install provisioning profiles
        env:
          PROFILE_APP_BASE64: ${{ secrets.APPLE_PROFILE_APP_BASE64 }}
          PROFILE_EXT_BASE64: ${{ secrets.APPLE_PROFILE_EXT_BASE64 }}
          PROFILE_WIDGET_BASE64: ${{ secrets.APPLE_PROFILE_WIDGET_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo -n "$PROFILE_APP_BASE64" | base64 --decode > "$PROFILES_DIR/fp_app_store.mobileprovision"
          echo -n "$PROFILE_EXT_BASE64" | base64 --decode > "$PROFILES_DIR/fp_ext_app_store.mobileprovision"
          echo -n "$PROFILE_WIDGET_BASE64" | base64 --decode > "$PROFILES_DIR/fp_widget_app_store.mobileprovision"
          ls -la "$PROFILES_DIR"

      # Secrets.plist 须在 xcodegen 之前生成,才会被收进 app bundle(否则运行时
      # AppConfig 退化为本地模式、无 Supabase)。SENTRY_DSN 留空 → 用 AppConfig
      # 内置默认 DSN;环境固定 production。值为已知安全字符(URL / 发布键),printf 直注。
      - name: Generate Secrets.plist from CI secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' > FreshPantry/Support/Secrets.plist
          {
            printf '<key>SUPABASE_URL</key><string>%s</string>' "$SUPABASE_URL"
            printf '<key>SUPABASE_PUBLISHABLE_KEY</key><string>%s</string>' "$SUPABASE_PUBLISHABLE_KEY"
            printf '<key>SENTRY_ENVIRONMENT</key><string>production</string>'
            printf '</dict></plist>\n'
          } >> FreshPantry/Support/Secrets.plist
          plutil -lint FreshPantry/Support/Secrets.plist

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project FreshPantry.xcodeproj -scheme FreshPantry

      # 发版前质量门禁:跑单元测试(Debug)。失败即终止,不进 archive/上传。
      # 想省 macOS 分钟可删除本步骤(本地已跑测试时)。
      # 动态取任一可用 iPhone 模拟器 UDID:runner 预装多个 iOS runtime,按设备名
      # 选会撞「destination ambiguous」;按 UDID 选则唯一。app 最低 iOS 26,各 runtime 均满足。
      - name: Run tests (gate)
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; c=[v for rt in d for v in d[rt] if v.get('isAvailable') and v['name'].startswith('iPhone')]; print(c[0]['udid'] if c else '')")
          if [ -z "$UDID" ]; then echo 'no available iPhone simulator'; exit 1; fi
          echo "Using simulator UDID: $UDID"
          xcodebuild test \
            -project FreshPantry.xcodeproj \
            -scheme FreshPantry \
            -destination "platform=iOS Simulator,id=$UDID"

      - name: Compute build number (UTC timestamp, monotonic)
        id: bn
        run: echo "build_number=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Read marketing version (release-please source of truth)
        id: ver
        run: echo "marketing_version=$(cat version.txt)" >> "$GITHUB_OUTPUT"

      # manual 显式 distribution 签名:Release 配置(project.yml)指定 CODE_SIGN_STYLE=Manual
      # + Apple Distribution 身份 + App Store profile 名;证书已导入 keychain、profile 已安装。
      # 不用 -allowProvisioningUpdates/-authenticationKey(那条自动签名路径在 archive 会退化
      # 为 Development 并撞证书配额,见提交历史)。
      - name: Archive (manual distribution signing)
        run: |
          xcodebuild archive \
            -project FreshPantry.xcodeproj \
            -scheme FreshPantry \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/FreshPantry.xcarchive \
            MARKETING_VERSION=${{ steps.ver.outputs.marketing_version }} \
            CURRENT_PROJECT_VERSION=${{ steps.bn.outputs.build_number }}

      # manual 导出:ExportOptions.plist 的 provisioningProfiles 把每个 bundle id 映射到
      # 已安装的 App Store profile;同样不需要 -allowProvisioningUpdates/-authenticationKey。
      - name: Export IPA (clean PATH avoids Homebrew GNU rsync "Copy failed")
        run: |
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" xcodebuild -exportArchive \
            -archivePath build/FreshPantry.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight (one retry)
        run: |
          ipas=(build/ipa/*.ipa)
          IPA="${ipas[0]}"
          echo "Uploading: $IPA"
          for attempt in 1 2; do
            if xcrun altool --upload-app -f "$IPA" -t ios \
                 --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"; then
              echo "upload ok"; exit 0
            fi
            echo "upload attempt $attempt failed; retrying in 30s"; sleep 30
          done
          echo "upload failed after retries"; exit 1

      # 发版优先:符号上传放在上传之后,失败仅本步骤标红(continue-on-error),
      # 不影响已上架构建。dSYM 按 UUID 关联,无需对齐 release。org/project 与
      # Flutter 侧一致(kunish / fresh_pantry),复用 SENTRY_AUTH_TOKEN。
      - name: Upload dSYMs to Sentry (non-blocking)
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npx --yes @sentry/cli@latest debug-files upload \
            --org kunish --project fresh_pantry \
            --include-sources \
            build/FreshPantry.xcarchive/dSYMs
