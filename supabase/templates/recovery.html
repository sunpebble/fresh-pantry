<div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f6f7f5;padding:24px">
  <div style="max-width:480px;margin:0 auto;background:#ffffff;border-radius:16px;padding:32px 28px;border:1px solid #eceee9">
    <div style="font-size:16px;font-weight:700;color:#2e7d32;margin-bottom:24px">🥬 Fresh Pantry</div>
    <h1 style="font-size:20px;font-weight:700;color:#1b1c1a;margin:0 0 12px">账号安全验证</h1>
    <p style="font-size:15px;line-height:1.6;color:#44483f;margin:0 0 16px">我们收到了你的账号验证请求，请在 App 中输入下面的验证码：</p>
    <div style="font-size:32px;font-weight:700;letter-spacing:10px;color:#1b5e20;background:#eef6ee;border-radius:12px;padding:18px 0;text-align:center;margin:8px 0 20px">{{ .Token }}</div>
    <p style="font-size:14px;line-height:1.6;color:#6b6f64;margin:0">验证码 60 分钟内有效，请勿向他人泄露。</p>
    <p style="font-size:13px;color:#9a9d94;line-height:1.6;margin-top:24px">如果这不是你本人的操作，请忽略此邮件，你的账号仍然安全。</p>
  </div>
</div>
