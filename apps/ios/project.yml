name: FreshPantry
options:
  bundleIdPrefix: com.kunish
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.47.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "62HCT6Q83X"
    # 本地开发默认值。发版版本号的单一真源是 version.txt(由 release-please 维护);
    # CI 构建时以 MARKETING_VERSION=$(cat version.txt) 注入覆盖此处。
    MARKETING_VERSION: "1.2.1"
    # 本地默认 build 号。CI 以 CURRENT_PROJECT_VERSION=<UTC 时间戳> 注入覆盖。
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_ISOLATED_DEFAULT_VALUES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_MODULE_VERIFIER: NO

targets:
  FreshPantry:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantry
        excludes:
          - "Support/Secrets.example.plist"
          # Bundled as a folder reference below (keeps the 174 HowToCook covers in a
          # RecipeImages/ subdirectory of the .app instead of flattened into root).
          - "Resources/RecipeImages"
      - path: FreshPantry/Resources/RecipeImages
        type: folder
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      # Embed the share extension so 分享 from 懒饭/下厨房 opens 新建食谱 pre-filled.
      # Plain extension (custom-scheme handoff, no App Group) → the app's own
      # signing/entitlements are unchanged; only this bundle is added to the archive.
      - target: ShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry
        PRODUCT_NAME: FreshPantry
        INFOPLIST_FILE: FreshPantry/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        # 本地调试:自动管理开发签名(无需手动证书/描述文件)
        Debug:
          CODE_SIGN_STYLE: Automatic
        # 发布 / CI archive:manual 显式 distribution 签名。ephemeral runner 上自动签名
        # 对 archive 一律退化为 Development → 撞证书配额;改用预生成 App Store profile
        # + 导入的 Apple Distribution 证书,确定走分发签名。
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry App Store

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.ShareExtension
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry ShareExtension App Store

  FreshPantryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryTests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.tests
        GENERATE_INFOPLIST_FILE: YES

# 显式共享 scheme:本地与 CI 都用 `-scheme FreshPantry`。此前依赖 Xcode GUI 打开时
# autocreate 的 user scheme,`xcodegen generate` 重建工程后即丢失("contains no
# schemes"),命令行构建/测试无 scheme 可用 — 显式声明保证每次生成都可复现。
schemes:
  FreshPantry:
    build:
      targets:
        FreshPantry: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FreshPantryTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
