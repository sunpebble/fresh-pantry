name: FreshPantry
options:
  bundleIdPrefix: com.sunpebble
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  knownRegions:
    - zh-Hans
    - en
    - ja
    - fr
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.47.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.17.0"

# 只挂进工程导航器(Xcode 里可视化编辑),不进任何 target 的 build phase。
fileGroups:
  - Products.storekit

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "62HCT6Q83X"
    # 本地开发默认值。发版版本号的单一真源是 version.txt(由 release-please 维护);
    # CI 构建时以 MARKETING_VERSION=$(cat version.txt) 注入覆盖此处。
    MARKETING_VERSION: "1.20.0"
    # 本地默认 build 号。CI 以 CURRENT_PROJECT_VERSION=<UTC 时间戳> 注入覆盖。
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_ISOLATED_DEFAULT_VALUES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_MODULE_VERIFIER: NO

targets:
  FreshPantry:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantry
        excludes:
          - "Support/Secrets.example.plist"
          - "Resources/howtocook.json"
          - "Resources/howtocook.i18n.en.json"
          - "Resources/howtocook.i18n.fr.json"
          - "Resources/howtocook.i18n.ja.json"
          # Recipe covers now stream from Supabase Storage (disk-cached on device via
          # RemoteImageCache), NOT bundled — keeps the app ~111MB slimmer. The files
          # stay in the repo as the pipeline's upload source but are excluded from the
          # app target (see apps/recipe-pipeline/README.md → 联网补图 / Supabase 迁移).
          - "Resources/RecipeImages"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      # Embed the share extension so 分享 from 懒饭/下厨房 opens 新建食谱 pre-filled.
      # Plain extension (custom-scheme handoff, no App Group) → the app's own
      # signing/entitlements are unchanged; only this bundle is added to the archive.
      - target: ShareExtension
        embed: true
      - target: FreshPantryWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.freshpantry
        PRODUCT_NAME: FreshPantry
        INFOPLIST_FILE: FreshPantry/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: FreshPantry/Support/FreshPantry.entitlements

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.freshpantry.share
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO

  FreshPantryWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      # widget-only 代码(视图/provider/bundle)。
      - path: FreshPantryWidgets
      # 跨进程共享类型(intent/快照/队列/身份/内容枚举)经 **dual-target membership** 同时编进
      # app + widget 两个 target(app 侧见 FreshPantry target:不再 exclude Widgets/Shared),
      # **不走 framework**:交互/配置 intent 由 chronod 按主 app bundle 的运行时 AppIntents 索引
      # (按 identifier)解析,而 framework 的 intent 在 release 下不被 linkd 注册进该索引(FB #425)。
      - path: FreshPantry/Widgets/Shared
      # ⚠️ widget 扩展仍刻意【只】编 Widgets/Shared(纯 Foundation/AppIntents),【不】编
      # Widgets/App / Persistence / repos / SwiftData:取数全在 app 侧算好写进 App Group
      # (WidgetSnapshotPublisher),widget 只读那份小 JSON;交互勾选只 append 到 App Group
      # 队列(WidgetPendingToggleStore),app 前台再落库(WidgetPendingToggleDrainer→
      # ShoppingToggleService)。真机 30MB 预算不受影响。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.freshpantry.widget
        PRODUCT_NAME: FreshPantryWidgets
        INFOPLIST_FILE: FreshPantryWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: FreshPantryWidgets/FreshPantryWidgets.entitlements

  FreshPantryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryTests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.freshpantry.tests
        GENERATE_INFOPLIST_FILE: YES

  # XCUITest — drives the real app over the live TabView lifecycle (the only place
  # cross-tab nav races surface). Launches with `-uiTesting` for a clean, seeded,
  # signed-out state. Runs on iPhone (sidebarAdaptable → bottom tab bar).
  FreshPantryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryUITests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.freshpantry.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: FreshPantry

# 显式共享 scheme:本地与 CI 都用 `-scheme FreshPantry`。此前依赖 Xcode GUI 打开时
# autocreate 的 user scheme,`xcodegen generate` 重建工程后即丢失("contains no
# schemes"),命令行构建/测试无 scheme 可用 — 显式声明保证每次生成都可复现。
schemes:
  FreshPantry:
    build:
      targets:
        FreshPantry: all
    run:
      config: Debug
      # 本地 StoreKit 配置(freshpantry.pro 买断):模拟器/真机调试不接 App Store
      # Connect 即可走完购买/恢复流程。仅影响 Run,测试与发布构建不受其影响。
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
      targets:
        - FreshPantryTests
        - FreshPantryUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
