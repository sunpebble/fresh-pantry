name: FreshPantry
options:
  bundleIdPrefix: com.kunish
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.47.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "62HCT6Q83X"
    # 本地开发默认值。发版版本号的单一真源是 version.txt(由 release-please 维护);
    # CI 构建时以 MARKETING_VERSION=$(cat version.txt) 注入覆盖此处。
    MARKETING_VERSION: "1.20.0"
    # 本地默认 build 号。CI 以 CURRENT_PROJECT_VERSION=<UTC 时间戳> 注入覆盖。
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_ISOLATED_DEFAULT_VALUES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_MODULE_VERIFIER: NO

targets:
  FreshPantry:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantry
        excludes:
          - "Support/Secrets.example.plist"
          # Recipe covers now stream from Supabase Storage (disk-cached on device via
          # RemoteImageCache), NOT bundled — keeps the app ~111MB slimmer. The files
          # stay in the repo as the pipeline's upload source but are excluded from the
          # app target (see apps/recipe-pipeline/README.md → 联网补图 / Supabase 迁移).
          - "Resources/RecipeImages"
          # Widgets/Shared 现编进独立 framework FreshPantryWidgetKit(app+widget 都链接、
          # 唯一模块/唯一类型)。绝不能再让 app target 直接编译它,否则又造出
          # FreshPantry.* 重复类型,交互 widget intent 真机执行查找命名不匹配(chronod
          # "no metadata for ... in com.kunish.freshPantry")。见 FreshPantryWidgetKit target。
          - "Widgets/Shared"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      # Embed the share extension so 分享 from 懒饭/下厨房 opens 新建食谱 pre-filled.
      # Plain extension (custom-scheme handoff, no App Group) → the app's own
      # signing/entitlements are unchanged; only this bundle is added to the archive.
      - target: ShareExtension
        embed: true
      - target: FreshPantryWidgets
        embed: true
      # 共享 widget intent/类型的唯一模块,**静态**链接进 app 二进制 → 其 AppIntents 元数据
      # 经处理器的 --static-metadata-file-list 直接【合并】进 app 自己的 Metadata.appintents。
      # (动态 framework 的元数据只留在自己 bundle、不并入 app,chronod 按 app bundle id 查不到
      # → 真机 "no metadata for ToggleShoppingItemIntent in com.kunish.freshPantry"。)静态库无
      # 独立 bundle,不 embed。
      - target: FreshPantryWidgetKit
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry
        PRODUCT_NAME: FreshPantry
        INFOPLIST_FILE: FreshPantry/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: FreshPantry/Support/FreshPantry.entitlements
      configs:
        # 本地调试:自动管理开发签名(无需手动证书/描述文件)
        Debug:
          CODE_SIGN_STYLE: Automatic
        # 发布 / CI archive:manual 显式 distribution 签名。ephemeral runner 上自动签名
        # 对 archive 一律退化为 Development → 撞证书配额;改用预生成 App Store profile
        # + 导入的 Apple Distribution 证书,确定走分发签名。
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry App Store

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.ShareExtension
        PRODUCT_NAME: ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry ShareExtension App Store

  FreshPantryWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      # widget-only 代码(视图/provider/bundle)。跨进程共享类型(intent/快照/队列/
      # 身份/内容枚举)已移入 FreshPantryWidgetKit framework,widget 链接它而非重复编译
      # ——否则 widget 模块会生成 FreshPantryWidgets.* 独立类型,与 app bundle 里的不一致,
      # 交互 intent 真机执行查找失配(chronod "no metadata in com.kunish.freshPantry")。
      - path: FreshPantryWidgets
      # ⚠️ widget 扩展刻意【不】链接 Persistence / repos / SwiftData:取数全在 app 侧
      # 算好写进 App Group(WidgetSnapshotPublisher),widget 只读那份小 JSON 显示;
      # 交互勾选只 append 到 App Group 队列(WidgetPendingToggleStore),app 前台再落库
      # (WidgetPendingToggleDrainer→ShoppingToggleService)。framework 全是纯 Foundation/
      # AppIntents,不引入 SwiftData,真机 30MB 预算不受影响。
    dependencies:
      # 共享 intent/类型的唯一模块(由宿主 app 嵌入,扩展只链接不重复 embed)。
      - target: FreshPantryWidgetKit
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.Widgets
        PRODUCT_NAME: FreshPantryWidgets
        INFOPLIST_FILE: FreshPantryWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: FreshPantryWidgets/FreshPantryWidgets.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: FreshPantry Widgets App Store

  # 共享 widget 模块:app 与 widget 都链接的唯一动态 framework,承载交互/配置 intent
  # 与跨进程纯类型。目的=全工程只有一个 ToggleShoppingItemIntent / SelectWidgetContentIntent
  # 类型身份(模块名 FreshPantryWidgetKit),widget 的 Button(intent:) 发出的 LNAction
  # 与 app bundle 聚合元数据里的 mangled 名一致,chronod 后台执行(openAppWhenRun=NO)
  # 才能在主 app bundle 命中。全是 Foundation/AppIntents,不拖 SwiftData。
  FreshPantryWidgetKit:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantry/Widgets/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.WidgetKit
        PRODUCT_NAME: FreshPantryWidgetKit
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        # **静态库**:符号 + AppIntents 元数据被【链接进】每个消费方二进制(app / widget),
        # 处理器经 --static-metadata-file-list 把本模块的 intent 元数据【合并】进消费方自己的
        # Metadata.appintents(动态 framework 的元数据只留在自己 bundle、不并入,chronod 按
        # app bundle id 查不到)。静态库无独立 Mach-O dylib,不签名、不嵌入。
        MACH_O_TYPE: staticlib
        SKIP_INSTALL: YES
        CODE_SIGNING_ALLOWED: NO

  FreshPantryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryTests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.tests
        GENERATE_INFOPLIST_FILE: YES

  # XCUITest — drives the real app over the live TabView lifecycle (the only place
  # cross-tab nav races surface). Launches with `-uiTesting` for a clean, seeded,
  # signed-out state. Runs on iPhone (sidebarAdaptable → bottom tab bar).
  FreshPantryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FreshPantryUITests
    dependencies:
      - target: FreshPantry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kunish.freshPantry.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: FreshPantry

# 显式共享 scheme:本地与 CI 都用 `-scheme FreshPantry`。此前依赖 Xcode GUI 打开时
# autocreate 的 user scheme,`xcodegen generate` 重建工程后即丢失("contains no
# schemes"),命令行构建/测试无 scheme 可用 — 显式声明保证每次生成都可复现。
schemes:
  FreshPantry:
    build:
      targets:
        FreshPantry: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FreshPantryTests
        - FreshPantryUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
